apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: public.ecr.aws/karpenter
      chart: karpenter
      targetRevision: 1.6.0
      helm:
        valueFiles:
          - $values-repo/karpenter/values.yaml

    - repoURL: https://github.com/pedrohro1992/cloud-labs-gitops-infra.git 
      targetRevision: HEAD
      ref: values-repo 
  
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
