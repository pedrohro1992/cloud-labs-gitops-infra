apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/pedrohro1992/cloud-labs-gitops-infra.git'
    targetRevision: HEAD
    path: argocd-apps 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
